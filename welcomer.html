<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcomer Preview - Bluu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --a: 99, 120, 255; --a2: 138, 79, 255; }

        body {
            font-family: 'Inter', sans-serif;
            background: #03030a;
            color: #8080a0;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none;
        }

        /* SILK */
        #silk {
            position: fixed; inset: 0; z-index: 0;
            opacity: 0.35; pointer-events: none;
        }

        .grain {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 160px;
        }

        /* CURSOR */
        .cur-dot {
            position: fixed; width: 5px; height: 5px; border-radius: 50%;
            background: rgba(var(--a), 1);
            box-shadow: 0 0 10px rgba(var(--a), 0.8);
            pointer-events: none; z-index: 99999;
            transform: translate(-50%,-50%);
            transition: transform 0.12s ease, opacity 0.2s ease;
        }

        .cur-ring {
            position: fixed; width: 38px; height: 38px; border-radius: 50%;
            border: 1px solid rgba(var(--a), 0.35);
            pointer-events: none; z-index: 99998;
            transform: translate(-50%,-50%);
            transition: width 0.4s cubic-bezier(0.22,1,0.36,1), height 0.4s cubic-bezier(0.22,1,0.36,1), border-color 0.4s;
        }

        .cur-ring::before {
            content: ''; position: absolute; inset: -1px; border-radius: 50%;
            padding: 1px;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(var(--a),0.8) 60deg, transparent 120deg);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: rspin 3s linear infinite;
        }

        @keyframes rspin { to { transform: rotate(360deg); } }

        body.hovering .cur-dot { transform: translate(-50%,-50%) scale(0); opacity: 0; }
        body.hovering .cur-ring { width: 54px; height: 54px; border-color: rgba(var(--a),0.55); }
        body.clicking .cur-ring { width: 28px; height: 28px; }

        /* LAYOUT */
        .page {
            position: relative; z-index: 3;
            max-width: 1280px; margin: 0 auto;
            padding: 60px 32px 80px;
        }

        /* HEADER */
        .header {
            text-align: center; margin-bottom: 56px;
        }

        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px; border-radius: 50px;
            font-size: 10px; font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase;
            margin-bottom: 24px;
            background: rgba(var(--a), 0.07);
            border: 1px solid rgba(var(--a), 0.16);
            position: relative; overflow: hidden;
        }

        .badge-text {
            background: linear-gradient(110deg, rgba(var(--a),0.6) 0%, rgba(var(--a),0.6) 30%, #fff 50%, rgba(var(--a),0.6) 70%, rgba(var(--a),0.6) 100%);
            background-size: 250% 100%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }

        .badge-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(var(--a), 1); box-shadow: 0 0 8px rgba(var(--a), 0.9);
            animation: blink 2.2s ease infinite;
        }

        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.25; } }

        .header h1 {
            font-size: 42px; font-weight: 800; letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #c8d4ff 60%, rgba(var(--a),1) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 10px;
        }

        .header p { font-size: 14px; color: #2c2c42; }

        /* MAIN GRID */
        .main {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* SETTINGS PANEL */
        .panel {
            position: sticky; top: 32px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 28px;
            backdrop-filter: blur(20px);
        }

        .panel-title {
            font-size: 12px; font-weight: 700;
            color: rgba(var(--a),0.8);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 22px;
        }

        .field { margin-bottom: 18px; }

        .field label {
            display: block; font-size: 12px; font-weight: 600;
            color: #5a5a7a; margin-bottom: 7px; letter-spacing: 0.3px;
        }

        .field input[type="text"],
        .field input[type="url"],
        .field textarea {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px; padding: 10px 14px;
            color: #c0c0e0; font-family: 'Inter', sans-serif;
            font-size: 13px; outline: none;
            transition: border-color 0.3s;
        }

        .field input[type="text"]:focus,
        .field input[type="url"]:focus,
        .field textarea:focus {
            border-color: rgba(var(--a), 0.4);
        }

        .field textarea { resize: vertical; min-height: 72px; line-height: 1.6; }

        .field input[type="color"] {
            width: 100%; height: 38px; border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px; background: rgba(255,255,255,0.03);
            cursor: pointer; padding: 3px 6px;
        }

        .toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }

        .toggle {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; padding: 10px 14px;
            cursor: pointer; transition: border-color 0.3s, background 0.3s;
            user-select: none;
        }

        .toggle:hover { border-color: rgba(var(--a),0.2); background: rgba(var(--a),0.04); }

        .toggle span { font-size: 12px; font-weight: 600; color: #5a5a7a; }

        .toggle-knob {
            width: 32px; height: 18px; border-radius: 9px;
            background: rgba(255,255,255,0.08);
            position: relative; transition: background 0.3s; flex-shrink: 0;
        }

        .toggle-knob::after {
            content: ''; position: absolute;
            width: 12px; height: 12px; border-radius: 50%;
            background: #fff; top: 3px; left: 3px;
            transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
        }

        .toggle.on .toggle-knob { background: rgba(var(--a),1); }
        .toggle.on .toggle-knob::after { transform: translateX(14px); }

        .divider {
            height: 1px; background: rgba(255,255,255,0.05);
            margin: 20px 0;
        }

        /* TAB SWITCHER */
        .tabs {
            display: flex; gap: 6px; margin-bottom: 22px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 4px;
        }

        .tab {
            flex: 1; padding: 8px; border-radius: 8px;
            font-size: 12px; font-weight: 600; text-align: center;
            cursor: pointer; color: #4a4a6a;
            transition: all 0.3s;
        }

        .tab.active {
            background: rgba(var(--a),0.15);
            color: rgba(var(--a),1);
        }

        /* PREVIEW AREA */
        .preview-wrap {
            display: flex; flex-direction: column; gap: 20px;
        }

        .preview-label {
            font-size: 11px; font-weight: 700; color: #3a3a52;
            text-transform: uppercase; letter-spacing: 1.5px;
        }

        .canvas-container {
            position: relative;
            border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 32px 80px rgba(0,0,0,0.5);
        }

        canvas {
            display: block; width: 100%; height: auto;
            border-radius: 16px;
        }

        .canvas-hint {
            margin-top: 12px;
            font-size: 12px; color: #2c2c42; text-align: center;
        }

        /* FADE UP */
        .fu { opacity: 0; transform: translateY(24px); transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1); }
        .fu.on { opacity: 1; transform: translateY(0); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
            .panel { position: static; }
        }
    </style>
</head>
<body>

<canvas id="silk"></canvas>
<div class="grain"></div>
<div class="cur-dot" id="cur-dot"></div>
<div class="cur-ring" id="cur-ring"></div>

<div class="page">
    <div class="header fu">
        <div class="badge"><span class="badge-dot"></span><span class="badge-text">Live Preview</span></div>
        <h1>Welcomer Preview</h1>
        <p>Customize and preview your welcome image in real-time.</p>
    </div>

    <div class="main fu">
        <!-- SETTINGS -->
        <div class="panel">
            <div class="tabs">
                <div class="tab active" id="tab-join" onclick="switchTab('join')">Join</div>
                <div class="tab" id="tab-leave" onclick="switchTab('leave')">Leave</div>
            </div>

            <p class="panel-title">Appearance</p>

            <div class="field">
                <label>Background Image URL</label>
                <input type="url" id="bg-url" placeholder="https://example.com/image.jpg" oninput="render()">
            </div>

            <div class="field">
                <label>Accent Color</label>
                <input type="color" id="accent-color" value="#6378ff" oninput="render()">
            </div>

            <div class="divider"></div>
            <p class="panel-title">Content</p>

            <div class="field">
                <label>Title</label>
                <input type="text" id="title" value="Welcome to {server}!" oninput="render()">
            </div>

            <div class="field">
                <label>Message</label>
                <textarea id="message" oninput="render()">Hey {username}, we are glad to have you here.</textarea>
            </div>

            <div class="field">
                <label>Footer <span style="color:#2e2e46">(optional)</span></label>
                <input type="text" id="footer" placeholder="Read our rules in #rules" oninput="render()">
            </div>

            <div class="divider"></div>
            <p class="panel-title">Options</p>

            <div class="toggles">
                <div class="toggle on" id="toggle-avatar" onclick="toggleOpt('avatar')">
                    <span>Avatar</span>
                    <div class="toggle-knob"></div>
                </div>
                <div class="toggle on" id="toggle-count" onclick="toggleOpt('count')">
                    <span>Member Count</span>
                    <div class="toggle-knob"></div>
                </div>
            </div>

            <div class="divider"></div>
            <p class="panel-title">Mock Data</p>

            <div class="field">
                <label>Username</label>
                <input type="text" id="mock-username" value="YourUsername" oninput="render()">
            </div>

            <div class="field">
                <label>Server Name</label>
                <input type="text" id="mock-server" value="Alohomora" oninput="render()">
            </div>

            <div class="field">
                <label>Member Count</label>
                <input type="text" id="mock-count" value="1234" oninput="render()">
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="preview-wrap">
            <p class="preview-label">Canvas Preview — 1100 x 440px</p>
            <div class="canvas-container">
                <canvas id="preview" width="1100" height="440"></canvas>
            </div>
            <p class="canvas-hint">This is exactly what members will see when they join your server.</p>
        </div>
    </div>
</div>

<script>
// ══════ SILK WebGL ══════
(function() {
    const canvas = document.getElementById('silk');
    const gl = canvas.getContext('webgl');
    if (!gl) return;

    const vert = `attribute vec2 a; varying vec2 vUv; void main(){ vUv=a*.5+.5; gl_Position=vec4(a,0,1); }`;
    const frag = `
        precision highp float;
        varying vec2 vUv;
        uniform float uTime, uSpeed, uScale, uRot, uNoise;
        uniform vec3 uColor;
        const float e=2.71828182845904523536;
        float noise(vec2 t){ float G=e; vec2 r=(G*sin(G*t)); return fract(r.x*r.y*(1.+t.x)); }
        vec2 rot(vec2 uv,float a){ float c=cos(a),s=sin(a); return mat2(c,-s,s,c)*uv; }
        void main(){
            float rnd=noise(gl_FragCoord.xy);
            vec2 uv=rot(vUv*uScale,uRot)*uScale;
            float t=uSpeed*uTime;
            uv.y+=.03*sin(8.*uv.x-t);
            float p=.6+.4*sin(5.*(uv.x+uv.y+cos(3.*uv.x+5.*uv.y)+.02*t)+sin(20.*(uv.x+uv.y-.1*t)));
            vec4 c=vec4(uColor,1.)*vec4(p)-rnd/15.*uNoise;
            gl_FragColor=vec4(c.rgb,1.);
        }
    `;

    function mk(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
    const prog=gl.createProgram();
    gl.attachShader(prog,mk(gl.VERTEX_SHADER,vert));
    gl.attachShader(prog,mk(gl.FRAGMENT_SHADER,frag));
    gl.linkProgram(prog); gl.useProgram(prog);

    const buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
    const loc=gl.getAttribLocation(prog,'a');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

    const U={ time:gl.getUniformLocation(prog,'uTime'), color:gl.getUniformLocation(prog,'uColor'), speed:gl.getUniformLocation(prog,'uSpeed'), scale:gl.getUniformLocation(prog,'uScale'), rot:gl.getUniformLocation(prog,'uRot'), noise:gl.getUniformLocation(prog,'uNoise') };
    gl.uniform3f(U.color,.15,.22,.72); gl.uniform1f(U.speed,3); gl.uniform1f(U.scale,1.2); gl.uniform1f(U.rot,0); gl.uniform1f(U.noise,1.5);

    function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; gl.viewport(0,0,canvas.width,canvas.height); }
    let t0=null;
    function frame(ts){ if(!t0)t0=ts; gl.uniform1f(U.time,(ts-t0)*.001); gl.drawArrays(gl.TRIANGLE_STRIP,0,4); requestAnimationFrame(frame); }
    resize(); window.addEventListener('resize',resize); requestAnimationFrame(frame);
})();

// ══════ CURSOR ══════
const dot=document.getElementById('cur-dot'), ring=document.getElementById('cur-ring');
let tx=0,ty=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{ tx=e.clientX; ty=e.clientY; dot.style.left=tx+'px'; dot.style.top=ty+'px'; });
(function rl(){ rx+=(tx-rx)*.1; ry+=(ty-ry)*.1; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(rl); })();
document.addEventListener('mousedown',()=>document.body.classList.add('clicking'));
document.addEventListener('mouseup',()=>document.body.classList.remove('clicking'));
document.querySelectorAll('input,textarea,.toggle,.tab').forEach(el=>{ el.addEventListener('mouseenter',()=>document.body.classList.add('hovering')); el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering')); });

// ══════ FADE UP ══════
const io=new IntersectionObserver(entries=>{ entries.forEach((e,i)=>{ if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('on'),i*80); io.unobserve(e.target); } }); },{threshold:.07});
document.querySelectorAll('.fu').forEach(el=>io.observe(el));

// ══════ TAB SWITCHER ══════
let currentTab = 'join';
function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-join').classList.toggle('active', tab === 'join');
    document.getElementById('tab-leave').classList.toggle('active', tab === 'leave');
    // Update defaults
    if (tab === 'leave') {
        document.getElementById('title').value = '{username} has left {server}';
        document.getElementById('message').value = "We'll miss you, {username}.";
    } else {
        document.getElementById('title').value = 'Welcome to {server}!';
        document.getElementById('message').value = "Hey {username}, we are glad to have you here.";
    }
    render();
}

// ══════ TOGGLE OPTIONS ══════
const opts = { avatar: true, count: true };
function toggleOpt(key) {
    opts[key] = !opts[key];
    document.getElementById('toggle-' + (key === 'count' ? 'count' : 'avatar')).classList.toggle('on', opts[key]);
    render();
}

// ══════ HELPERS ══════
function resolveVars(text, data) {
    return text
        .replace(/{user}/g, '@' + data.username)
        .replace(/{username}/g, data.username)
        .replace(/{server}/g, data.server)
        .replace(/{membercount}/g, data.count.toLocaleString())
        .replace(/{membercount_ord}/g, ordinal(data.count));
}

function ordinal(n) {
    const s=['th','st','nd','rd'], v=n%100;
    return n.toLocaleString() + (s[(v-20)%10]||s[v]||s[0]);
}

function hexToRgba(hex, alpha) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let lines = [];
    for (let w of words) {
        const test = line + w + ' ';
        if (ctx.measureText(test).width > maxWidth && line !== '') {
            lines.push(line.trim());
            line = w + ' ';
        } else {
            line = test;
        }
    }
    if (line.trim()) lines.push(line.trim());
    lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
    return lines.length;
}

// ══════ AVATAR PLACEHOLDER ══════
function drawAvatarPlaceholder(ctx, x, y, size) {
    // Circle clip
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, size/2, 0, Math.PI * 2);
    ctx.clip();

    // Gradient background
    const grad = ctx.createRadialGradient(x - size*0.1, y - size*0.1, 0, x, y, size * 0.7);
    grad.addColorStop(0, '#4a5ccc');
    grad.addColorStop(1, '#1a1a3a');
    ctx.fillStyle = grad;
    ctx.fillRect(x - size/2, y - size/2, size, size);

    // Silhouette
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(x, y - size*0.08, size*0.23, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y + size*0.55, size*0.36, 0, Math.PI);
    ctx.fill();

    ctx.restore();
}

// ══════ MAIN RENDER ══════
let bgImage = null;
let lastBgUrl = '';

async function loadBg(url) {
    if (!url || url === lastBgUrl) return;
    lastBgUrl = url;
    bgImage = null;
    try {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        await new Promise((res, rej) => {
            img.onload = res; img.onerror = rej;
            img.src = url;
        });
        bgImage = img;
    } catch(e) { bgImage = null; }
}

async function render() {
    const bgUrl   = document.getElementById('bg-url').value.trim();
    const accent  = document.getElementById('accent-color').value;
    const title   = document.getElementById('title').value;
    const message = document.getElementById('message').value;
    const footer  = document.getElementById('footer').value.trim();
    const uname   = document.getElementById('mock-username').value || 'YourUsername';
    const server  = document.getElementById('mock-server').value || 'Alohomora';
    const count   = parseInt(document.getElementById('mock-count').value) || 1234;

    await loadBg(bgUrl);

    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');
    const W = 1100, H = 440;

    ctx.clearRect(0, 0, W, H);

    // ── BACKGROUND ──
    if (bgImage) {
        // Cover fit
        const scale = Math.max(W / bgImage.width, H / bgImage.height);
        const sw = bgImage.width * scale, sh = bgImage.height * scale;
        const sx = (W - sw) / 2, sy = (H - sh) / 2;
        ctx.drawImage(bgImage, sx, sy, sw, sh);

        // Dark overlay
        const overlay = ctx.createLinearGradient(0, 0, W, 0);
        overlay.addColorStop(0,   'rgba(4,4,14,0.90)');
        overlay.addColorStop(0.45,'rgba(4,4,14,0.75)');
        overlay.addColorStop(0.7, 'rgba(4,4,14,0.35)');
        overlay.addColorStop(1,   'rgba(4,4,14,0.15)');
        ctx.fillStyle = overlay;
        ctx.fillRect(0, 0, W, H);

        // Bottom vignette
        const vig = ctx.createLinearGradient(0, H*0.6, 0, H);
        vig.addColorStop(0, 'rgba(4,4,14,0)');
        vig.addColorStop(1, 'rgba(4,4,14,0.6)');
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, W, H);
    } else {
        // No image: mesh gradient
        const bg = ctx.createLinearGradient(0, 0, W, H);
        bg.addColorStop(0,   '#06061a');
        bg.addColorStop(0.5, '#0a0820');
        bg.addColorStop(1,   '#060614');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Subtle accent glow
        const glow = ctx.createRadialGradient(W*0.15, H*0.5, 0, W*0.15, H*0.5, 300);
        glow.addColorStop(0, hexToRgba(accent, 0.12));
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, W, H);
    }

    // ── ACCENT LINE (left edge) ──
    const lineGrad = ctx.createLinearGradient(0, H*0.2, 0, H*0.8);
    lineGrad.addColorStop(0, hexToRgba(accent, 0));
    lineGrad.addColorStop(0.5, hexToRgba(accent, 0.9));
    lineGrad.addColorStop(1, hexToRgba(accent, 0));
    ctx.fillStyle = lineGrad;
    ctx.fillRect(0, 0, 3, H);

    // ── AVATAR ──
    const avatarX = 120, avatarY = H / 2, avatarR = 72;

    if (opts.avatar) {
        // Outer ring glow
        ctx.save();
        ctx.shadowColor = accent;
        ctx.shadowBlur = 24;
        ctx.beginPath();
        ctx.arc(avatarX, avatarY, avatarR + 4, 0, Math.PI * 2);
        ctx.strokeStyle = hexToRgba(accent, 0.6);
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.restore();

        // Avatar circle
        drawAvatarPlaceholder(ctx, avatarX, avatarY, avatarR * 2);

        // Inner ring
        ctx.beginPath();
        ctx.arc(avatarX, avatarY, avatarR + 2, 0, Math.PI * 2);
        ctx.strokeStyle = hexToRgba(accent, 0.35);
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // ── TEXT AREA ──
    const textX = opts.avatar ? 230 : 60;
    const maxW = W - textX - 60;

    // Variables
    const data = { username: uname, server, count };
    const resolvedTitle   = resolveVars(title, data);
    const resolvedMessage = resolveVars(message, data);
    const resolvedFooter  = footer ? resolveVars(footer, data) : null;

    // Server label (small top)
    ctx.font = '500 13px Inter, sans-serif';
    ctx.fillStyle = hexToRgba(accent, 0.7);
    ctx.letterSpacing = '2px';
    const labelY = opts.avatar ? avatarY - avatarR - 24 : 100;
    ctx.fillText(server.toUpperCase(), textX, labelY);
    ctx.letterSpacing = '0px';

    // Title
    ctx.font = '700 34px Inter, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 8;
    const titleY = labelY + 46;
    wrapText(ctx, resolvedTitle, textX, titleY, maxW, 42);
    ctx.shadowBlur = 0;

    // Divider line
    const divY = titleY + 52;
    const divGrad = ctx.createLinearGradient(textX, 0, textX + 180, 0);
    divGrad.addColorStop(0, hexToRgba(accent, 0.7));
    divGrad.addColorStop(1, hexToRgba(accent, 0));
    ctx.fillStyle = divGrad;
    ctx.fillRect(textX, divY, 180, 1.5);

    // Message
    ctx.font = '400 16px Inter, sans-serif';
    ctx.fillStyle = 'rgba(200,205,235,0.85)';
    const msgY = divY + 24;
    const msgLines = wrapText(ctx, resolvedMessage, textX, msgY, maxW, 24);

    // Member count badge
    if (opts.count) {
        const badgeY = msgY + msgLines * 24 + 20;
        const badgeText = `You are our ${ordinal(count)} member`;

        ctx.font = '600 13px Inter, sans-serif';
        const tw = ctx.measureText(badgeText).width;
        const bpad = 14, bh = 28;

        // Badge background
        ctx.save();
        ctx.beginPath();
        const bx = textX, by = badgeY - bh + 4;
        ctx.roundRect(bx, by, tw + bpad * 2, bh, 14);
        ctx.fillStyle = hexToRgba(accent, 0.12);
        ctx.fill();
        ctx.strokeStyle = hexToRgba(accent, 0.25);
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = hexToRgba(accent, 0.9);
        ctx.fillText(badgeText, textX + bpad, badgeY);
    }

    // Footer
    if (resolvedFooter) {
        ctx.font = '400 13px Inter, sans-serif';
        ctx.fillStyle = 'rgba(130,130,160,0.6)';
        ctx.fillText(resolvedFooter, textX, H - 36);
    }

    // ── CORNER ACCENT (bottom right) ──
    const cornerGrad = ctx.createRadialGradient(W, H, 0, W, H, 200);
    cornerGrad.addColorStop(0, hexToRgba(accent, 0.08));
    cornerGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cornerGrad;
    ctx.fillRect(0, 0, W, H);
}

// Init
window.addEventListener('load', () => {
    // Load Inter font for canvas
    const font = new FontFace('Inter', 'url(https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2)');
    font.load().then(f => { document.fonts.add(f); render(); }).catch(() => render());
});

document.getElementById('bg-url').addEventListener('change', render);
</script>
</body>
